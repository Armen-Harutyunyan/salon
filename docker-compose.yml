services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    ports:
      - '3000:3000'
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: mongodb://mongo:27017/salon
      NODE_ENV: production
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', 'mongodb://127.0.0.1:27017/admin', '--eval', 'db.runCommand({ ping: 1 }).ok']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mongodb_data:
